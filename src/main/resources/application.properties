# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL Database ───────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-cool-credit-a4dv2s5m.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_ot5SGzrE8wHv}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT Configuration ────────────────────────────────────────────────────────
# IMPORTANT: Change this to a strong 256-bit secret in production!
jwt.secret=${JWT_SECRET:hostelcare_super_secret_key_change_in_production_32chars}
jwt.expiration=86400000

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Directory where complaint images are stored
file.upload-dir=${UPLOAD_DIR:./uploads}

# ─── Email ────────────────────────────────────────────────────────────────────
# Email is disabled. EmailService uses a stub/log-only implementation.

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.hostelcare=DEBUG
logging.level.org.springframework.security=INFO
